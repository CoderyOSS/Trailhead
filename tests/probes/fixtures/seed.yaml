workflows:
  - name: "simple"
    content: |
      name: simple
      description: "Simple two-stage workflow for testing"
      stages:
        plan:
          skill: plan
          prompt: "Plan: {{input}}"
          tools: [bash, read, glob, grep]
          max_tokens: 8000
          routes:
            - when: 'response.complexity == "simple"'
              next: done
            - when: 'true'
              next: done
        done:
          skill: pause
          prompt: "Done"
          routes: null
    source: "builtin"
    created_at: "2026-01-01T00:00:00Z"
    updated_at: "2026-01-01T00:00:00Z"
  - name: "feature"
    content: |
      name: feature
      description: "Feature implementation workflow"
      stages:
        plan:
          skill: plan
          prompt: "Create a plan for: {{input}}"
          tools: [bash, read, glob, grep]
          max_tokens: 8000
          routes:
            - when: 'response.complexity == "simple"'
              next: implement
            - when: 'response.complexity == "complex"'
              next: plan_detail
        plan_detail:
          skill: plan_detail
          prompt: "Detailed plan based on: {{stages.plan.output}}"
          tools: [bash, read, glob, grep]
          max_tokens: 8000
          routes:
            - when: 'true'
              next: implement
        implement:
          skill: implement
          prompt: "Implement: {{input}}"
          tools: [bash, read, write, edit, glob, grep]
          max_tokens: 8096
          checkpoint: true
          routes:
            - when: 'response.success'
              next: done
            - when: 'true'
              next: implement
        done:
          skill: pause
          prompt: "Complete"
          routes: null
    source: "builtin"
    created_at: "2026-01-01T00:00:00Z"
    updated_at: "2026-01-01T00:00:00Z"
