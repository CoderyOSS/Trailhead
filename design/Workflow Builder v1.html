<!doctype html>
<html lang="en" data-theme="dark" data-accent="orange" data-theme-variant="slate">
<head>
<meta charset="utf-8">
<title>Trailhead — workflow manager · v1 (combined)</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="assets/codery-glyph.svg">
<link rel="stylesheet" href="v1/colors_and_type.css">
<link rel="stylesheet" href="v1/themes.css">
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--co-bg-0); color: var(--co-text); font-family: var(--co-font-sans); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--co-bg-4); border: 2px solid transparent; background-clip: padding-box; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--co-bg-5); background-clip: padding-box; }
  input:focus, textarea:focus, select:focus { box-shadow: var(--co-shadow-focus); border-color: var(--co-accent) !important; }
  button { font-family: var(--co-font-sans); }
  @keyframes co-pulse  { 0%, 100% { opacity: 1 } 50% { opacity: .4 } }
  @keyframes co-blink  { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
  @keyframes co-slide-in { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes co-dash-flow { to { stroke-dashoffset: -16; } }
  .co-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--co-text-subtle); font-family: var(--co-font-mono); font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
<script>
  const __isRObserverNoise = (m) => typeof m === "string" && /ResizeObserver loop/i.test(m);
  window.addEventListener("error", (e) => { if (__isRObserverNoise(e.message)) { e.stopImmediatePropagation(); e.preventDefault(); return false; } }, true);
  const __origConsoleError = console.error.bind(console);
  console.error = (...args) => { if (args.length && __isRObserverNoise(args[0])) return; __origConsoleError(...args); };
</script>
</head>
<body>
  <div id="root"><div class="co-loading">loading v1 reference…</div></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="v1/src/Common.jsx"></script>
  <script type="text/babel" src="v1/src/data.js"></script>
  <script type="text/babel" src="v1/src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="v1/src/Sidebar.jsx"></script>
  <script type="text/babel" src="v1/src/TopBar.jsx"></script>
  <script type="text/babel" src="v1/src/Canvas.jsx"></script>
  <script type="text/babel" src="v1/src/StageDrawer.jsx"></script>
  <script type="text/babel" src="v1/src/Filmstrip.jsx"></script>
  <script type="text/babel" src="v1/src/RunsView.jsx"></script>
  <script type="text/babel" src="v1/src/App.jsx"></script>
</body>
</html>
