name: quick-fix
description: "Quick fix workflow"
branch: main

stages:
  plan:
    skill: plan
    commits: allowed
    prompt: "Analyze and plan fix for: {{input}}"
    response_schema:
      type: object
      properties:
        plan: { type: string }
      required: [plan]
    tools: [bash, read, glob, grep]
    max_tokens: 4000
    routes:
      - when: 'true'
        next: implement

  implement:
    skill: implement
    commits: required
    prompt: "Fix the issue: {{input}}"
    response_schema:
      type: object
      properties:
        success: { type: boolean }
      required: [success]
    tools: [bash, read, write, edit, glob, grep]
    max_tokens: 8096
    checkpoint: true
    routes:
      - when: 'response.success'
        next: test
      - when: 'true'
        next: implement

  test:
    skill: test
    prompt: "Run tests to verify the fix."
    response_schema:
      type: object
      properties:
        passed: { type: boolean }
      required: [passed]
    tools: [bash, read, write, edit, grep]
    routes: null
