name: Build
on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' crates/trailhead-service/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=trailhead-service-v${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p trailhead-service

      - name: Rename binary
        run: |
          cp target/release/trailhead-service trailhead-service-linux-x86_64
          chmod +x trailhead-service-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: trailhead-service-linux-x86_64
          generate_release_notes: true

  build-frontend:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd crates/trailhead-service/ui && npm install && npm run build

  build-worker-image:
    runs-on: ubuntu-latest
    needs: check
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: containers/worker
          file: containers/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/trailhead:worker-latest
            ghcr.io/${{ steps.owner.outputs.value }}/trailhead:worker-${{ github.sha }}
          provenance: false
          sbom: false
