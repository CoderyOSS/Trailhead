  html, body { height: 100%; }
  body {
    margin: 0;

    color: var(--co-text);
    font-family: var(--co-font-sans);

  }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--co-bg-4); border: 2px solid transparent; background-clip: padding-box; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--co-bg-5); background-clip: padding-box; }
  input:focus, textarea:focus, select:focus {
    box-shadow: var(--co-shadow-focus);
    border-color: var(--co-accent) !important;
  }
  button { font-family: var(--co-font-sans); }

  @keyframes co-pulse  { 0%, 100% { opacity: 1 } 50% { opacity: .4 } }
  @keyframes co-blink  { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
  @keyframes co-slide-in { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes co-spin    { to { transform: rotate(360deg); } }

  html { scroll-behavior: smooth; }
  .co-loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--co-text-subtle);
    font-family: var(--co-font-mono); font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* Sticky TOC width tighter on smaller screens */
  @media (max-width: 1180px) {
    nav { display: none !important; }
  }
</style>
<script>
  // Patch ResizeObserver to debounce callbacks through requestAnimationFrame.
  // This breaks the synchronous "callback mutates layout → observer fires
  // again" loop the browser flags as "ResizeObserver loop completed with
  // undelivered notifications". Functionally equivalent to the unpatched
  // observer (still gets called with up-to-date entries); just on the next
  // frame instead of synchronously.
  (function () {
    if (typeof ResizeObserver !== 'function') return;
    const Native = ResizeObserver;
    window.ResizeObserver = class PatchedRO {
      constructor(cb) {
        let pending = null;
        this._inner = new Native((entries, obs) => {
          if (pending) cancelAnimationFrame(pending);
          pending = requestAnimationFrame(() => { pending = null; try { cb(entries, obs); } catch (e) {} });
        });
      }
      observe(...a)   { return this._inner.observe(...a); }
      unobserve(...a) { return this._inner.unobserve(...a); }
      disconnect()    { return this._inner.disconnect(); }
    };
  })();

  // Also swallow the warning if it still leaks through (e.g. from a
  // browser-native observer we don't control).
  const __isRObserverNoise = (m) => typeof m === "string" && /ResizeObserver loop/i.test(m);
  window.addEventListener("error", (e) => {
    if (__isRObserverNoise(e.message)) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
  }, true);
  const __origOnError = window.onerror;
  window.onerror = function (msg, src, line, col, err) {
    if (__isRObserverNoise(msg)) return true;
    return __origOnError ? __origOnError.apply(this, arguments) : false;
  };
  const __origConsoleError = console.error.bind(console);
  console.error = (...args) => { if (args.length && __isRObserverNoise(args[0])) return; __origConsoleError(...args); };
</script>
