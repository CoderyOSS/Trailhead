<!doctype html>
<html lang="en" data-theme="dark" data-accent="orange" data-theme-variant="slate">
<head>
<meta charset="utf-8">
<title>Trailhead — workflow manager</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="assets/codery-glyph.svg">
<link rel="stylesheet" href="colors_and_type.css">
<link rel="stylesheet" href="themes.css">
<style>
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--co-bg-0);
    color: var(--co-text);
    font-family: var(--co-font-sans);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--co-bg-4); border: 2px solid transparent; background-clip: padding-box; border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--co-bg-5); background-clip: padding-box; }

  input:focus, textarea:focus, select:focus {
    box-shadow: var(--co-shadow-focus);
    border-color: var(--co-accent) !important;
  }

  button { font-family: var(--co-font-sans); }

  /* Accent swap is defined in themes.css so all four theme variants share
     a single source of truth. The keyframes below are still local. */

  /* Keyframes */
  @keyframes co-pulse  { 0%, 100% { opacity: 1 } 50% { opacity: .4 } }
  @keyframes co-blink  { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
  @keyframes co-slide-in {
    from { transform: translateX(24px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  @keyframes co-dash-flow {
    to { stroke-dashoffset: -16; }
  }

  /* For the placeholder until React mounts */
  .co-loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--co-text-subtle);
    font-family: var(--co-font-mono); font-size: 12px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
</style>
<script>
  // ResizeObserver loop warning is a benign browser race when an observer's
  // callback synchronously mutates layout. Several browsers report it as an
  // error event even though nothing is broken. Swallow that specific message.
  const __isRObserverNoise = (m) => typeof m === "string" && /ResizeObserver loop/i.test(m);
  window.addEventListener("error", (e) => {
    if (__isRObserverNoise(e.message)) {
      e.stopImmediatePropagation();
      e.preventDefault();
      return false;
    }
  }, true);
  const __origConsoleError = console.error.bind(console);
  console.error = (...args) => {
    if (args.length && __isRObserverNoise(args[0])) return;
    __origConsoleError(...args);
  };
</script>
</head>
<body>
  <div id="root"><div class="co-loading">loading workflow…</div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/Common.jsx"></script>
  <script type="text/babel" src="src/data.js"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/Rail.jsx"></script>
  <script type="text/babel" src="src/WorkflowsSidebar.jsx"></script>
  <script type="text/babel" src="src/JobsSidebar.jsx"></script>
  <script type="text/babel" src="src/TopBar.jsx"></script>
  <script type="text/babel" src="src/Canvas.jsx"></script>
  <script type="text/babel" src="src/BuilderOverlay.jsx"></script>
  <script type="text/babel" src="src/StageDrawer.jsx"></script>
  <script type="text/babel" src="src/YamlDrawer.jsx"></script>
  <script type="text/babel" src="src/Filmstrip.jsx"></script>
  <script type="text/babel" src="src/RunsView.jsx"></script>
  <script type="text/babel" src="src/SettingsModal.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
