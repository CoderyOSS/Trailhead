name: Build
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  release:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(crates/|Cargo\.(toml|lock)|containers/worker/)'; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine next version
        if: steps.changes.outputs.release == 'true'
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'trailhead-service-v*' --sort=-version:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            V="${LATEST_TAG#trailhead-service-v}"
            IFS='.' read -r major minor patch <<< "$V"
            NEW="${major}.${minor}.$((patch + 1))"
          else
            NEW="0.1.0"
          fi
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=trailhead-service-v${NEW}" >> "$GITHUB_OUTPUT"

      - name: Stamp Cargo.toml version
        if: steps.changes.outputs.release == 'true'
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" \
            crates/trailhead-service/Cargo.toml

      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.release == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.release == 'true'

      - name: Build release binary
        if: steps.changes.outputs.release == 'true'
        run: cargo build --release -p trailhead-service

      - name: Rename binary
        if: steps.changes.outputs.release == 'true'
        run: |
          cp target/release/trailhead-service trailhead-service-linux-x86_64
          chmod +x trailhead-service-linux-x86_64

      - name: Create GitHub Release
        if: steps.changes.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: trailhead-service-linux-x86_64
          generate_release_notes: true

  build-frontend:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd crates/trailhead-service/ui && npm install && npm run build

  build-worker-image:
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase owner
        id: owner
        run: echo "value=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: containers/worker
          file: containers/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.value }}/trailhead:worker-latest
            ghcr.io/${{ steps.owner.outputs.value }}/trailhead:worker-${{ github.sha }}
          provenance: false
          sbom: false
