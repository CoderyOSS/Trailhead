name: feature
description: "Implement a feature from spec"
branch: main

stages:
  plan:
    skill: plan
    commits: allowed
    prompt: |
      Create an implementation plan for: {{input}}
      Project: {{project.repo}} ({{project.branch}})
    response_schema:
      type: object
      properties:
        complexity: { type: string, enum: [simple, complex] }
        plan: { type: string }
      required: [complexity, plan]
    tools: [bash, read, glob, grep]
    max_tokens: 8000
    timeout_secs: 600
    routes:
      - when: 'response.complexity == "simple"'
        next: implement
      - when: 'response.complexity == "complex"'
        next: plan_detail
      - when: 'true'
        next: pause_for_human

  plan_detail:
    skill: plan_detail
    prompt: |
      Create a detailed plan based on: {{stages.plan.output}}
    response_schema:
      type: object
      properties:
        plan: { type: string }
      required: [plan]
    tools: [bash, read, glob, grep]
    max_tokens: 8000
    timeout_secs: 600
    routes:
      - when: 'true'
        next: implement

  implement:
    skill: implement
    prompt: |
      Implement the following plan: {{input}}
    response_schema:
      type: object
      properties:
        success: { type: boolean }
        files_changed: { type: integer }
      required: [success, files_changed]
    tools: [bash, read, write, edit, glob, grep]
    max_tokens: 8096
    timeout_secs: 600
    checkpoint: true
    routes:
      - when: 'response.success && response.files_changed > 0'
        next: test
      - when: 'true'
        next: implement

  test:
    skill: test
    prompt: |
      Run the test suite and fix any failures.
    response_schema:
      type: object
      properties:
        passed: { type: boolean }
        failure_count: { type: integer }
      required: [passed, failure_count]
    tools: [bash, read, write, edit, grep]
    max_tokens: 8096
    timeout_secs: 600
    routes:
      - when: 'response.passed'
        next: review
      - when: 'response.failure_count > 3'
        next: pause_for_human
      - when: 'true'
        next: fix

  fix:
    skill: fix
    prompt: |
      Fix the test failures.
      Previous test output: {{stages.test.output}}
    response_schema:
      type: object
      properties:
        fixed: { type: boolean }
        remaining: { type: integer }
      required: [fixed, remaining]
    tools: [bash, read, write, edit, grep]
    max_tokens: 8096
    timeout_secs: 600
    routes:
      - when: 'response.fixed'
        next: test
      - when: 'response.remaining > 5'
        next: pause_for_human
      - when: 'true'
        next: implement

  review:
    skill: review
    prompt: |
      Review all changes for correctness and style.
    response_schema:
      type: object
      properties:
        approved: { type: boolean }
        issues: { type: integer }
      required: [approved, issues]
    tools: [bash, read, glob, grep]
    max_tokens: 8096
    timeout_secs: 600
    routes:
      - when: 'response.approved'
        next: pr
      - when: 'true'
        next: implement

  pr:
    skill: create_pr
    prompt: "Create a pull request with all changes."
    response_schema:
      type: object
      properties:
        pr_url: { type: string }
      required: [pr_url]
    tools: [bash]
    routes: null

  pause_for_human:
    skill: pause
    prompt: "Pausing for human review."
    routes: null
