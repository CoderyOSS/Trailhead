name: Release
on:
  push:
    tags:
      - "agent-runner-v*"
      - "trailhead-service-v*"

jobs:
  release-agent-runner:
    if: startsWith(github.ref, 'refs/tags/agent-runner-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p agent-runner
      - uses: actions/upload-artifact@v4
        with:
          name: agent-runner-linux-x86_64
          path: target/release/agent-runner
      - uses: softprops/action-gh-release@v2
        with:
          files: target/release/agent-runner

  release-trailhead-service:
    if: startsWith(github.ref, 'refs/tags/trailhead-service-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p trailhead-service
      - uses: actions/upload-artifact@v4
        with:
          name: trailhead-service-linux-x86_64
          path: target/release/trailhead-service
      - uses: softprops/action-gh-release@v2
        with:
          files: target/release/trailhead-service

  build-agent-runner-image:
    if: startsWith(github.ref, 'refs/tags/agent-runner-v')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/agent-runner/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:agent-runner-${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:agent-runner-latest
